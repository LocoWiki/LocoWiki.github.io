<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>LocoWiki · 飞书知识库</title>
    <link rel="icon" href="assets/img/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/markdown.css" />
  </head>
  <body data-layout="docs">
    <header id="site-header"></header>

    <div class="layout">
      <aside id="site-sidebar"></aside>

      <main class="content">
        <article class="md feishu-wiki-page">
          <h1>飞书知识库</h1>
          <p>
            本页用于站内查看飞书知识库。若浏览器策略阻止内嵌（常见于第三方 Cookie / 跨域限制），请直接使用“新标签打开”。
          </p>

          <div class="dock-toolbar">
            <a id="open-feishu-link" class="btn primary" href="#" target="_blank" rel="noopener noreferrer"
              >新标签打开知识库</a
            >
            <button id="reload-feishu" class="btn" type="button">刷新内嵌视图</button>
          </div>

          <div class="sync-meta">
            <div><strong>飞书同步状态：</strong><span id="sync-status-text">读取中…</span></div>
            <div id="sync-status-detail" class="sync-meta-detail"></div>
          </div>

          <div id="embed-notice" class="loading">正在尝试加载飞书知识库…</div>
          <div class="feishu-embed-wrap">
            <iframe
              id="feishu-frame"
              title="飞书知识库内嵌视图"
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
          </div>

          <h2>维护说明</h2>
          <p>
            面向开发者的同步接入说明已迁移到仓库 <code>docs/</code> 目录，前台页面仅保留用户阅读与状态展示。
          </p>
          <ul>
            <li>
              开发文档索引：
              <a href="https://github.com/Lain-Ego0/LocoWiki.github.io/tree/main/docs" target="_blank" rel="noopener noreferrer">docs/</a>
            </li>
            <li>
              飞书同步指南：
              <a href="https://github.com/Lain-Ego0/LocoWiki.github.io/blob/main/docs/feishu-sync.md" target="_blank" rel="noopener noreferrer">docs/feishu-sync.md</a>
            </li>
          </ul>
        </article>
      </main>

      <aside id="site-toc" class="toc" aria-label="目录">
        <div class="toc-title">本页目录</div>
        <div id="toc-items"></div>
      </aside>
    </div>

    <footer id="site-footer"></footer>

    <script src="assets/js/site.js" defer></script>
    <script src="assets/js/feishu-wiki.js" defer></script>
    <script src="assets/js/page-toc.js" defer></script>
  </body>
</html>
