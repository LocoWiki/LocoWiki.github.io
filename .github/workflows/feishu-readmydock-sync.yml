name: Feishu Readmydock Sync

on:
  repository_dispatch:
    types:
      - feishu_wiki_sync
  workflow_dispatch:
    inputs:
      event_type:
        description: "Event type shown on Readmydock status panel"
        required: false
        default: "manual"
      message:
        description: "Status message shown on Readmydock panel"
        required: false
        default: "Manual sync trigger"

permissions:
  contents: write

jobs:
  update-feishu-sync-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update sync status json
        env:
          MANUAL_EVENT_TYPE: ${{ github.event.inputs.event_type }}
          MANUAL_MESSAGE: ${{ github.event.inputs.message }}
          FEISHU_SPACE_URL: https://wcn9j5638vrr.feishu.cn/wiki/space/7570988375279517715?ccm_open_type=lark_wiki_spaceLink&open_tab_from=wiki_home
        run: node scripts/update-feishu-sync-status.mjs

      - name: Commit and push
        run: |
          if git diff --quiet -- assets/feishu-sync-status.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/feishu-sync-status.json
          git commit -m "chore: refresh Feishu sync status"
          git push
